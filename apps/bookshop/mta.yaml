_schema-version: "3.1"
ID: pnpm-bookshop
version: 1.0.0
description: CAP Bookshop with pnpm

parameters:
  enable-parallel-deployments: true

modules:
  - name: pnpm-bookshop-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 1024M
    build-parameters:
      builder: custom
      commands:
        - npm install --production
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: pnpm-bookshop-db
      - name: pnpm-bookshop-auth

  - name: pnpm-bookshop-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 1024M
    build-parameters:
      builder: custom
      commands:
        - npm install --production
    requires:
      - name: pnpm-bookshop-db

resources:
  - name: pnpm-bookshop-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  - name: pnpm-bookshop-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: xs-security.json
